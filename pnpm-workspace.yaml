packages:
  - "."

# pnpm v11 security settings
allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  esbuild: false
  "prisma": true
  "sharp": true

# Enforce a 24-hour window (1440 minutes) on all downloaded packages
# This prevents downloading malicious packages immediately after publication
minimumReleaseAge: 1440

overrides:
  # Neither hono nor postcss is imported by app code — these pin transitive
  # copies inside prisma's dev CLI and next respectively past their advisories
  # (hono <4.12.25: CORS reflection + 4 more; postcss <8.5.10: XSS in stringify).
  "hono": ">=4.12.25"
  "@hono/node-server": ">=1.19.13"
  "postcss": ">=8.5.10"
